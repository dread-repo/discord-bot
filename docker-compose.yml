services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - '127.0.0.1:6379:6379'

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ['/app/scripts/docker-entrypoint.sh']
    command: ['node', 'dist/index.js']
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ['/app/scripts/docker-entrypoint.sh']
    command: ['node', 'dist/worker.js']
    # GitHub webhooks (005): cloudflared on host → http://127.0.0.1:61952
    ports:
      - '127.0.0.1:61952:61952'
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      WEBHOOK_PORT: '61952'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
